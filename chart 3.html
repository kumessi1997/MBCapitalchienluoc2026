<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ Tài sản Tích lũy</title>
    <!-- Tải thư viện Chart.js từ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS Reset cơ bản & Cài đặt Font */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #eaedf2;
            /* Xám nhạt mặc định của toàn trang */
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container chính của Dashboard */
        .dashboard {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            transition: background-color 0.3s ease;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .dashboard-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }

        /* Bảng điều khiển màu sắc (Control Panel) */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
        }

        /* Tùy chỉnh input color cho đẹp mắt */
        input[type="color"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #cbd5e1;
            border-radius: 50%;
        }

        input[type="color"]::-moz-color-swatch {
            border: 2px solid #cbd5e1;
            border-radius: 50%;
        }

        /* Vùng chứa biểu đồ */
        .chart-container {
            position: relative;
            aspect-ratio: 5 / 3;
            width: 100%;
        }

        /* Responsive cho Mobile */
        @media (max-width: 600px) {
            .dashboard {
                padding: 15px;
            }

            .chart-container {
                height: auto;
            }

            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Capture Button Style */
        .capture-btn {
            background-color: #071c2c;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .capture-btn:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .capture-btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>

    <div class="dashboard" id="dashboardCard">
        <div class="dashboard-header relative">
            <h1>Tài sản tích lũy qua đầu tư định kỳ</h1>
            <button onclick="downloadImage('assetChart', 'bieu-do-tai-san-tich-luy')" class="capture-btn absolute right-0 top-0" title="Tải ảnh biểu đồ">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span>Chụp ảnh</span>
            </button>
        </div>

        <!-- Control Panel chỉnh màu và dữ liệu -->
        <div class="control-panel">
            <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase">Nhãn (ngăn cách bởi dấu phẩy)</label>
                    <textarea id="dataLabels" class="w-full p-2 text-sm border rounded h-20">23 tuổi, 30 tuổi, 40 tuổi, 50 tuổi</textarea>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase">Gốc (triệu VND)</label>
                    <textarea id="inputGoc" class="w-full p-2 text-sm border rounded h-20">4440, 3600, 2400, 1200</textarea>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase">Lãi (triệu VND)</label>
                    <textarea id="inputLai" class="w-full p-2 text-sm border rounded h-20">20971, 10576, 3326, 612</textarea>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-500 uppercase">Tổng (triệu VND)</label>
                    <textarea id="inputTong" class="w-full p-2 text-sm border rounded h-20">25411, 14176, 5726, 1812</textarea>
                </div>
            </div>
            <div class="flex flex-wrap gap-4 items-center justify-center w-full pt-4 border-t border-slate-200">
                <div class="control-item">
                    <input type="color" id="colorGoc" value="#071c2c">
                    <label for="colorGoc">Màu Gốc</label>
                </div>
                <div class="control-item">
                    <input type="color" id="colorLai" value="#384956">
                    <label for="colorLai">Màu Lãi</label>
                </div>
                <div class="control-item">
                    <input type="color" id="colorTong" value="#a28c75">
                    <label for="colorTong">Màu Tổng</label>
                </div>
                <div class="control-item">
                    <input type="color" id="colorBg" value="#ffffff">
                    <label for="colorBg">Màu Nền</label>
                </div>
            </div>
        </div>

        <!-- Biểu đồ -->
        <div class="chart-container">
            <canvas id="assetChart"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. Dữ liệu mẫu (Mặc định)
            let labels = ['23 tuổi', '30 tuổi', '40 tuổi', '50 tuổi'];
            let dataGoc = [4440, 3600, 2400, 1200];
            let dataLai = [20971, 10576, 3326, 612];
            let dataTong = [25411, 14176, 5726, 1812];

            // Hàm format số có dấu phân cách hàng nghìn
            const formatNumber = (num) => {
                return num.toLocaleString('vi-VN');
            };

            // 2. Custom Plugin: Hiển thị giá trị trên đầu mỗi cột
            const topLabelsPlugin = {
                id: 'topLabelsPlugin',
                afterDatasetsDraw(chart, args, pluginOptions) {
                    const { ctx, data } = chart;
                    ctx.save();
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';

                    chart.data.datasets.forEach((dataset, i) => {
                        const meta = chart.getDatasetMeta(i);
                        if (!meta.hidden) {
                            meta.data.forEach((bar, index) => {
                                const value = dataset.data[index];
                                ctx.fillStyle = '#475569';
                                ctx.fillText(formatNumber(value), bar.x, bar.y - 5);
                            });
                        }
                    });
                    ctx.restore();
                }
            };

            // Lấy Context của Canvas
            const ctx = document.getElementById('assetChart').getContext('2d');

            // 3. Khởi tạo Chart.js
            let assetChart = new Chart(ctx, {
                type: 'bar', // Dạng biểu đồ cột
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Gốc (triệu VND)',
                            data: dataGoc,
                            backgroundColor: document.getElementById('colorGoc').value,
                            borderRadius: 4,
                            barPercentage: 0.8,
                            categoryPercentage: 0.8
                        },
                        {
                            label: 'Lãi (triệu VND)',
                            data: dataLai,
                            backgroundColor: document.getElementById('colorLai').value,
                            borderRadius: 4,
                            barPercentage: 0.8,
                            categoryPercentage: 0.8
                        },
                        {
                            label: 'Tổng tài sản (triệu VND)',
                            data: dataTong,
                            backgroundColor: document.getElementById('colorTong').value,
                            borderRadius: 4,
                            barPercentage: 0.8,
                            categoryPercentage: 0.8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1000,
                        easing: 'easeOutQuart'
                    },
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: {
                                    family: "'Segoe UI', Roboto, sans-serif",
                                    size: 13
                                },
                                usePointStyle: true,
                                padding: 20
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 14, family: "'Segoe UI', Roboto, sans-serif" },
                            bodyFont: { size: 13, family: "'Segoe UI', Roboto, sans-serif" },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function (context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label = label.split(' (')[0] + ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += formatNumber(context.parsed.y) + ' triệu VND';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grace: '15%',
                            grid: {
                                color: '#e2e8f0',
                                drawBorder: false
                            },
                            ticks: {
                                font: { family: "'Segoe UI', Roboto, sans-serif" },
                                color: '#64748b',
                                callback: function (value) {
                                    return formatNumber(value);
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                font: {
                                    family: "'Segoe UI', Roboto, sans-serif",
                                    weight: 'bold',
                                    size: 13
                                },
                                color: '#334155'
                            }
                        }
                    }
                },
                plugins: [topLabelsPlugin]
            });

            // 4. Xử lý Logic Control Panel (Cập nhật realtime)
            const colorGocInput = document.getElementById('colorGoc');
            const colorLaiInput = document.getElementById('colorLai');
            const colorTongInput = document.getElementById('colorTong');
            const colorBgInput = document.getElementById('colorBg');
            const dashboardCard = document.getElementById('dashboardCard');

            const dataLabelsInput = document.getElementById('dataLabels');
            const inputGoc = document.getElementById('inputGoc');
            const inputLai = document.getElementById('inputLai');
            const inputTong = document.getElementById('inputTong');

            function updateAll() {
                // Cập nhật dữ liệu từ textareas
                assetChart.data.labels = dataLabelsInput.value.split(',').map(s => s.trim());
                assetChart.data.datasets[0].data = inputGoc.value.split(',').map(s => parseFloat(s.trim()) || 0);
                assetChart.data.datasets[1].data = inputLai.value.split(',').map(s => parseFloat(s.trim()) || 0);
                assetChart.data.datasets[2].data = inputTong.value.split(',').map(s => parseFloat(s.trim()) || 0);

                // Cập nhật màu sắc
                assetChart.data.datasets[0].backgroundColor = colorGocInput.value;
                assetChart.data.datasets[1].backgroundColor = colorLaiInput.value;
                assetChart.data.datasets[2].backgroundColor = colorTongInput.value;
                dashboardCard.style.backgroundColor = colorBgInput.value;

                assetChart.update();
            }

            // Gắn sự kiện lắng nghe cho tất cả inputs
            [colorGocInput, colorLaiInput, colorTongInput, colorBgInput, dataLabelsInput, inputGoc, inputLai, inputTong].forEach(input => {
                input.addEventListener('input', updateAll);
            });

        });

        // Hàm tải ảnh biểu đồ
        function downloadImage(canvasId, fileName) {
            const canvas = document.getElementById(canvasId);
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = '#ffffff';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            const link = document.createElement('a');
            link.download = fileName + '.png';
            link.href = tempCanvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>

</html>
