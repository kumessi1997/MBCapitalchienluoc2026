<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng hợp Biểu đồ Chiến lược Đầu tư 2026</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Prevent body scroll, let sidebar and iframe scroll */
        }

        /* Custom scrollbar for sidebar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-slate-50 h-screen w-screen flex antialiased">

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full bg-slate-900 text-white p-4 flex justify-between items-center z-50">
        <h1 class="text-lg font-bold truncate">Chiến lược Đầu tư</h1>
        <button id="mobileMenuBtn" class="text-white hover:text-blue-400 focus:outline-none">
            <i class="ph ph-list text-2xl"></i>
        </button>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="bg-slate-900 text-slate-300 w-72 h-full flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 fixed md:relative z-40 hidden md:flex top-16 md:top-0 border-r border-slate-800">
        <div class="p-6 hidden md:block border-b border-slate-800">
            <div class="flex items-center gap-3">
                <img src="mblogo.svg" alt="MB Capital Logo" class="w-12 h-12 object-contain">
                <div>
                    <h1 class="text-lg font-bold text-white tracking-wide">MB CAPITAL</h1>
                    <p class="text-xs text-slate-400 font-medium">Chiến lược 2026</p>
                </div>
            </div>
        </div>

        <div class="p-4 flex-1 overflow-y-auto sidebar-scroll">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 px-2">Danh sách Biểu đồ</p>
            <nav class="space-y-2">

                <button onclick="loadChart('chart1.html', this)"
                    class="chart-link w-full flex items-center gap-3 px-3 py-3 rounded-xl bg-blue-600/10 text-blue-400 transition-all text-left group">
                    <div class="p-2 rounded-lg bg-blue-600/20 group-hover:bg-blue-600/30 transition-colors">
                        <i class="ph ph-trend-up text-lg"></i>
                    </div>
                    <span class="font-medium text-sm leading-tight flex-1">Biểu đồ Lãi Kép & Lạm Phát</span>
                </button>

                <button onclick="loadChart('chart2.html', this)"
                    class="chart-link w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all text-left group">
                    <div class="p-2 rounded-lg bg-slate-800 group-hover:bg-slate-700 transition-colors">
                        <i class="ph ph-coins text-lg"></i>
                    </div>
                    <span class="font-medium text-sm leading-tight flex-1">Biểu đồ tích lũy 10 triệu/tháng</span>
                </button>

                <button onclick="loadChart('chart 3.html', this)"
                    class="chart-link w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all text-left group">
                    <div class="p-2 rounded-lg bg-slate-800 group-hover:bg-slate-700 transition-colors">
                        <i class="ph ph-chart-bar text-lg"></i>
                    </div>
                    <span class="font-medium text-sm leading-tight flex-1">Biểu đồ Tài sản Tích lũy</span>
                </button>

                <button onclick="loadChart('chart4.html', this)"
                    class="chart-link w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all text-left group">
                    <div class="p-2 rounded-lg bg-slate-800 group-hover:bg-slate-700 transition-colors">
                        <i class="ph ph-globe-hemisphere-west text-lg"></i>
                    </div>
                    <span class="font-medium text-sm leading-tight flex-1">Biểu đồ GDP/người (USD)</span>
                </button>

                <button onclick="loadChart('chart 5.html', this)"
                    class="chart-link w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all text-left group">
                    <div class="p-2 rounded-lg bg-slate-800 group-hover:bg-slate-700 transition-colors">
                        <i class="ph ph-chart-line text-lg"></i>
                    </div>
                    <span class="font-medium text-sm leading-tight flex-1">Tăng trưởng VN-Index & GDP</span>
                </button>

                <button onclick="loadChart('chart 7.html', this)"
                    class="chart-link w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all text-left group">
                    <div class="p-2 rounded-lg bg-slate-800 group-hover:bg-slate-700 transition-colors">
                        <i class="ph ph-globe-stand text-lg"></i>
                    </div>
                    <span class="font-medium text-sm leading-tight flex-1">Báo Cáo Quỹ Mở Toàn Cầu</span>
                </button>

                <button onclick="loadChart('chart 8.html', this)"
                    class="chart-link w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition-all text-left group">
                    <div class="p-2 rounded-lg bg-slate-800 group-hover:bg-slate-700 transition-colors">
                        <i class="ph ph-chart-line-up text-lg"></i>
                    </div>
                    <span class="font-medium text-sm leading-tight flex-1">Tăng trưởng NAV & Chứng chỉ quỹ</span>
                </button>
            </nav>
        </div>

        <!-- Footer -->
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3 px-3 py-2">
                <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-slate-300">
                    <i class="ph ph-user"></i>
                </div>
                <div class="flex-1">
                    <p class="text-xs font-semibold text-white">Chuyên viên Đầu tư</p>
                    <p class="text-[10px] text-slate-400">Dữ liệu 2026</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Overlay for mobile -->
    <div id="sidebarOverlay"
        class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-30 hidden md:hidden transition-opacity"></div>

    <!-- Main Content Area -->
    <main class="flex-1 h-screen flex flex-col bg-slate-100 relative pt-16 md:pt-0 pb-0">
        <!-- Display embedded chart iframe -->
        <div class="flex-1 w-full relative">

            <!-- Loading indicator -->
            <div id="loadingIndicator"
                class="absolute inset-x-0 top-0 flex items-center justify-center p-4 z-10 transition-opacity duration-300 hidden pointer-events-none">
                <div
                    class="bg-white px-4 py-2 rounded-full shadow-lg border border-slate-200 flex items-center gap-3 animate-bounce">
                    <i class="ph ph-spinner animate-spin text-blue-600"></i>
                    <span class="text-sm font-medium text-slate-700">Đang tải biểu đồ...</span>
                </div>
            </div>

            <iframe id="chartFrame" src="chart1.html" class="w-full h-full border-none" title="Biểu đồ đang xem"
                onload="document.getElementById('loadingIndicator').classList.add('hidden');"></iframe>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const chartFrame = document.getElementById('chartFrame');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const chartLinks = document.querySelectorAll('.chart-link');

        // Initial setup for mobile view
        if (window.innerWidth < 768) {
            sidebar.classList.add('hidden');
        } else {
            sidebar.classList.remove('hidden');
        }

        // Toggle Sidebar recursively for Mobile
        function toggleSidebar() {
            const isHidden = sidebar.classList.contains('-translate-x-full');
            if (isHidden) {
                sidebar.classList.remove('hidden');
                // timeout to allow display:block to apply before transition
                setTimeout(() => {
                    sidebar.classList.remove('-translate-x-full');
                    sidebarOverlay.classList.remove('hidden');
                }, 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
                setTimeout(() => {
                    sidebar.classList.add('hidden');
                }, 300); // Wait for transition
            }
        }

        mobileMenuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        function loadChart(url, element) {
            // Show Loader
            loadingIndicator.classList.remove('hidden');

            // Set URL
            chartFrame.src = url;

            // Update active state in sidebar
            chartLinks.forEach(link => {
                link.classList.remove('bg-blue-600/10', 'text-blue-400');
                link.classList.add('hover:bg-slate-800', 'text-slate-400', 'hover:text-white');

                // Mod icon box
                const iconBox = link.querySelector('div');
                iconBox.classList.remove('bg-blue-600/20', 'group-hover:bg-blue-600/30');
                iconBox.classList.add('bg-slate-800', 'group-hover:bg-slate-700');
            });

            // Set current active
            element.classList.remove('hover:bg-slate-800', 'text-slate-400', 'hover:text-white');
            element.classList.add('bg-blue-600/10', 'text-blue-400');

            const iconBox = element.querySelector('div');
            iconBox.classList.remove('bg-slate-800', 'group-hover:bg-slate-700');
            iconBox.classList.add('bg-blue-600/20', 'group-hover:bg-blue-600/30');

            // Close sidebar on mobile after clicking
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        }
    </script>
</body>

</html>
